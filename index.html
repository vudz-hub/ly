<!DOCTYPE html>

      color: #fff;

    }

      max-width: 960px;

      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 1.4rem;
      margin: 0 0 4px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
      justify-content: space-between;
    }
    .controls-left {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button {
      padding: 6px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      background: #01696f;
      color: #fff;
      font-size: 0.95rem;
    }
    button.secondary {
      background: #555;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .question-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .question-title {
      font-weight: 600;
    }
    .question-part {
      font-size: 0.85rem;
      color: #555;
    }
    .question-text {
      margin: 4px 0 8px;
    }
    .question-image {
      margin: 6px 0 10px;
      text-align: center;
    }
    .question-image img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .option-label {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
    }
    .option-label:hover {
      background: #f0f8ff;
    }
    .option-input {
      margin-top: 3px;
    }
    .result-summary {
      margin-top: 16px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #f1f8e9;
      border: 1px solid #c5e1a5;
    }
    .question-feedback {
      margin-top: 6px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .correct {
      color: #2e7d32;
    }
    .incorrect {
      color: #c62828;
    }
    .correct-answer-highlight {
      border: 1px solid #2e7d32;
      background: #e8f5e9;
    }
    .footer-note {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #555;
    }
    @media (max-width: 600px) {

        border-radius: 0;

    // Hàm trộn mảng Fisher–Yates
    function shuffle(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Sinh câu hỏi ra giao diện với thứ tự câu và thứ tự đáp án đã trộn
    function renderQuestions() {
      const container = document.getElementById('questionContainer');
      container.innerHTML = '';

      // Trộn thứ tự câu mỗi lần
      const randomizedQuestions = shuffle(QUESTION_BANK).map((q, index) => {
        const optionOrder = shuffle(q.options.map((opt, idx) => ({ text: opt, originalIndex: idx })));
        return { ...q, displayIndex: index + 1, optionOrder };
      });

      // Lưu vào dataset toàn cục để chấm điểm
      window.__renderedQuestions = randomizedQuestions;

      randomizedQuestions.forEach((q) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.dataset.qid = q.id;

        const header = document.createElement('div');
        header.className = 'question-header';

        const title = document.createElement('div');
        title.className = 'question-title';
        title.textContent = `Câu ${q.displayIndex}`;

        const part = document.createElement('div');
        part.className = 'question-part';
        part.textContent = q.part;

        header.appendChild(title);
        header.appendChild(part);
        card.appendChild(header);

        const text = document.createElement('div');
        text.className = 'question-text';
        text.textContent = q.text;
        card.appendChild(text);

        if (q.image) {
          const imgWrap = document.createElement('div');
          imgWrap.className = 'question-image';
          const img = document.createElement('img');
          img.src = q.image;
          img.alt = 'Hình minh họa cho câu hỏi';
          img.loading = 'lazy';
          imgWrap.appendChild(img);
          card.appendChild(imgWrap);
        }

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        q.optionOrder.forEach((opt, idx) => {
          const label = document.createElement('label');
          label.className = 'option-label';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = q.id;
          input.value = opt.originalIndex; // lưu chỉ số đáp án gốc
          input.className = 'option-input';

          const span = document.createElement('span');
          span.textContent = opt.text;

          label.appendChild(input);
          label.appendChild(span);
          optionsDiv.appendChild(label);
        });

        card.appendChild(optionsDiv);

        const fb = document.createElement('div');
        fb.className = 'question-feedback';
        fb.style.display = 'none';
        card.appendChild(fb);

        container.appendChild(card);
      });

      document.getElementById('resultSummary').style.display = 'none';
      document.getElementById('statusText').textContent = 'Chưa nộp bài';
    }

    function gradeQuiz() {
      const rendered = window.__renderedQuestions || [];
      let correct = 0;
      let answered = 0;

      rendered.forEach((q) => {
        const card = document.querySelector(`.question-card[data-qid="${q.id}"]`);
        const selected = card.querySelector('input[type="radio"]:checked');
        const fb = card.querySelector('.question-feedback');
        fb.style.display = 'block';

        const optionLabels = card.querySelectorAll('.option-label');
        optionLabels.forEach((lb) => lb.classList.remove('correct-answer-highlight'));

        const correctIndex = q.correctIndex;
        const correctLabel = Array.from(optionLabels).find((lb) => {
          const input = lb.querySelector('input');
          return Number(input.value) === correctIndex;
        });
        if (correctLabel) correctLabel.classList.add('correct-answer-highlight');

        if (selected) {
          answered++;
          const selectedIndex = Number(selected.value);
          if (selectedIndex === correctIndex) {
            correct++;
            fb.textContent = 'Đúng';
            fb.classList.remove('incorrect');
            fb.classList.add('correct');
          } else {
            fb.textContent = 'Sai';
            fb.classList.remove('correct');
            fb.classList.add('incorrect');
          }
        } else {
          fb.textContent = 'Chưa chọn đáp án';
          fb.classList.remove('correct');
          fb.classList.add('incorrect');
        }
      });

      const total = rendered.length;
      const score10 = (correct / total * 10).toFixed(2);
      const summary = document.getElementById('resultSummary');
      summary.style.display = 'block';
      summary.innerHTML = `Đã trả lời ${answered}/${total} câu. <br> Số câu đúng: <strong>${correct}</strong>. Điểm quy đổi (thang 10): <strong>${score10}</strong>.`;

      document.getElementById('statusText').textContent = 'Đã nộp bài – xem đáp án gợi ý bên dưới từng câu.';
    }

    document.getElementById('shuffleBtn').addEventListener('click', () => {
      if (confirm('Trộn lại đề sẽ xóa toàn bộ lựa chọn hiện tại. Bạn có chắc không?')) {
        renderQuestions();
      }
    });

    document.getElementById('submitBtn').addEventListener('click', gradeQuiz);

    // Khởi tạo lần đầu
    renderQuestions();
  </script>
</body>
</html>
